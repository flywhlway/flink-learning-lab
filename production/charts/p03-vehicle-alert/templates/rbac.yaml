# Flink native-K8s JM 需要在作业命名空间 list/create pods（Operator 默认只在 flink-operator ns 建 Role）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: p03-vehicle-alert
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.serviceAccount }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: p03-vehicle-alert
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.serviceAccount }}-role-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: p03-vehicle-alert
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.serviceAccount }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount }}
    namespace: {{ .Values.namespace }}
