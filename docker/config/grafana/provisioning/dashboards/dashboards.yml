# Grafana file providers：p03 项目大盘 + 仓库级 monitoring/ 三块看板（PROD-04 / D-10）
apiVersion: 1
providers:
  - name: p03-vehicle
    orgId: 1
    folder: p03
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/p03
      foldersFromFilesStructure: false
  - name: flinklab-repo
    orgId: 1
    folder: flinklab
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/repo
      foldersFromFilesStructure: false
