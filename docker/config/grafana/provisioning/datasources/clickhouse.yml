# p03 Grafana ClickHouse 数据源（D-01）。lab 默认密码，勿用于生产。
apiVersion: 1
datasources:
  - name: ClickHouse
    uid: p03-clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      defaultDatabase: flinklab
      username: flinklab
    secureJsonData:
      password: flinklab123
