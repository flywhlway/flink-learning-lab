global:
  scrape_interval: 10s

scrape_configs:
  - job_name: flink-jobmanager
    static_configs:
      - targets: ["jobmanager:9249"]
  - job_name: flink-taskmanager
    # taskmanager 可能被 --scale 出多个实例,用 DNS A 记录发现
    dns_sd_configs:
      - names: ["taskmanager"]
        type: A
        port: 9249
