# flink-learning-lab · 本地企业级流平台(Apple Silicon / arm64 原生)
# 用法: make up / make init / make urls   (见同目录 Makefile)
name: flink-learning-lab

services:
  # ─────────────────────────── Kafka (KRaft, 无 ZooKeeper) ───────────────────────────
  kafka:
    image: ${KAFKA_IMAGE}
    container_name: fll-kafka
    ports:
      - "9094:9094"            # 宿主机访问入口 localhost:9094
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"    # 企业习惯:topic 显式管理,见 init.sh
      KAFKA_LOG_RETENTION_HOURS: 48
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # ─────────────────────────── Flink 集群 ───────────────────────────
  jobmanager:
    image: ${FLINK_IMAGE}
    container_name: fll-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"            # Flink Dashboard / REST
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        rest.bind-address: 0.0.0.0
        execution.checkpointing.dir: s3://flink/checkpoints
        execution.checkpointing.savepoint-dir: s3://flink/savepoints
        s3.endpoint: http://minio:9000
        s3.path.style.access: "true"
        s3.access-key: ${MINIO_ROOT_USER}
        s3.secret-key: ${MINIO_ROOT_PASSWORD}
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: "9249"
      ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-2.2.1.jar
    volumes:
      - ./jobs:/opt/flink/usrlib          # 本地构建好的作业 jar 放这里
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  taskmanager:
    image: ${FLINK_IMAGE}
    command: taskmanager
    # 不设 container_name,便于 `--scale taskmanager=N`
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        execution.checkpointing.dir: s3://flink/checkpoints
        execution.checkpointing.savepoint-dir: s3://flink/savepoints
        s3.endpoint: http://minio:9000
        s3.path.style.access: "true"
        s3.access-key: ${MINIO_ROOT_USER}
        s3.secret-key: ${MINIO_ROOT_PASSWORD}
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: "9249"
      ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-2.2.1.jar
    volumes:
      - ./jobs:/opt/flink/usrlib
    depends_on:
      jobmanager:
        condition: service_healthy

  # ─────────────────────────── 存储层 ───────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: fll-postgres
    command: postgres -c wal_level=logical -c max_wal_senders=8 -c max_replication_slots=8
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: flinklab
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d flinklab"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE}
    container_name: fll-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse:
    image: ${CLICKHOUSE_IMAGE}
    container_name: fll-clickhouse
    ports:
      - "8123:8123"            # HTTP
      - "9002:9000"            # Native(避让 MinIO 的 9000)
    environment:
      CLICKHOUSE_DB: flinklab
      CLICKHOUSE_USER: ${CH_USER}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./config/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: ${MINIO_IMAGE}
    container_name: fll-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"            # S3 API
      - "9001:9001"            # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local >/dev/null 2>&1 || curl -sf http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-init:
    image: ${MC_IMAGE}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/flink local/warehouse local/datasets &&
      echo 'MinIO buckets ready: flink / warehouse / datasets'
      "

  # ─────────────────────────── 可观测性 ───────────────────────────
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: fll-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: fll-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    container_name: fll-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: flink-learning-lab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────── Phase 3 · AI 向量库(profile=ai,按需启动)───────────────────────────
  # 用法:docker compose --profile ai up -d milvus-standalone
  # 说明:LLM 推理不进容器,走宿主机 Ollama(http://host.docker.internal:11434,OrbStack 原生支持);
  # 本 profile 只负责向量检索底座。standalone 版本自带 etcd(元数据)+ minio(对象存储,独立实例,
  # 与上方 lakehouse 用的 minio 分离以避免 bucket/权限耦合)。
  milvus-etcd:
    image: ${MILVUS_ETCD_IMAGE}
    container_name: fll-milvus-etcd
    profiles: ["ai"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 12

  milvus-minio:
    image: ${MINIO_IMAGE}
    container_name: fll-milvus-minio
    profiles: ["ai"]
    command: server /data --console-address ":9011"
    ports:
      - "9010:9000"
      - "9011:9011"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - milvus-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  milvus-standalone:
    image: ${MILVUS_IMAGE}
    container_name: fll-milvus
    profiles: ["ai"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19530:19530"          # Milvus SDK/gRPC 入口
      - "9091:9091"            # Milvus WebUI / 健康检查
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 12


volumes:
  kafka-data:
  pg-data:
  ch-data:
  minio-data:
  prom-data:
  grafana-data:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
