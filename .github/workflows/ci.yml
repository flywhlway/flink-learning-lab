# PROD-03 / D-08：GitHub Actions 门禁（编译 + qa_check）
# 本机验收仍以 OrbStack 实测为准；CI 不替代集群演练，也不要求推送到 K8s。
# 多架构 buildx 推送不是本 workflow 的 required job（见 production/docs/gitops-cicd.md 可选段）。
name: ci

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: compile-and-qa-check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python（qa_check compose YAML 回退解析）
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML（compose 无 docker 时的解析依赖）
        run: pip install --quiet pyyaml

      - name: Maven compile（examples 父工程，跳过测试）
        working-directory: examples
        run: mvn -B -T1C -DskipTests compile

      - name: Repository QA gate
        # 完整门禁：compose 可解析、违禁词、断链、案例计数、可选 mvn
        run: bash scripts/qa_check.sh
